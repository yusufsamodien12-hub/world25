<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Underworld Simulation v1.0.2</title>
  </head>
  <body>
    <div id="root">
      <div style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #050505; color: #fff; font-family: monospace;">
        <div style="text-align: center;">
          <div style="font-size: 24px; font-weight: bold; margin-bottom: 16px;">⚡ Loading Architect-OS...</div>
          <div id="loading-status" style="font-size: 12px; opacity: 0.5;">Initializing Neural Pathways</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Detect if JavaScript is running
      console.log('✅ HTML loaded, JavaScript executing');
      setTimeout(() => {
        const status = document.getElementById('loading-status');
        if (status) {
          status.textContent = 'Loading JavaScript modules...';
        }
      }, 100);
      
      // Detect if script fails to mount (by checking if the loading identifier is still present)
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML.includes('loading-status')) {
          const status = document.getElementById('loading-status');
          if (status) {
            status.innerHTML = '<span style="color: #ff4444;">❌ Failed to load application<br/><small>Check browser console for errors</small></span>';
          }
          console.error('❌ React app failed to mount after 10 seconds');
        }
      }, 10000);
    </script>
  </body>
</html>
